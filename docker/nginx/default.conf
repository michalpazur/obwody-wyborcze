upstream martin {
  server martin:3000;
}

proxy_cache_path  /var/cache/nginx/
                  levels=1:2
                  max_size=1g
                  use_temp_path=off
                  keys_zone=tiles_cache:10m;

map $host $http_scheme {
  localhost "http";
  default "https";
}

map $host $forwarded_host {
  localhost $host:$server_port;
  default $host;
}

server {
  listen 8080;

  server_name localhost wybory.it cloudflare.com;

  location ~ /api/martin(?<fwd_path>.*) {
    proxy_set_header        Host $host;
    proxy_set_header        X-Forwarded-Proto $http_scheme;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Host $forwarded_host;
    proxy_set_header        X-Rewrite-URL $uri;
    proxy_redirect          off;

    proxy_cache             tiles_cache;
    proxy_cache_lock        on;
    proxy_cache_revalidate  on;
    proxy_cache_valid       200 204 302 1h;
    proxy_cache_valid       404 1m;
    add_header              X-Cache-Status $upstream_cache_status;

    proxy_pass http://martin$fwd_path$is_args$args;
  }

  location / {           
    default_type "text/html";
    root /app;

    try_files $uri $uri.html $uri/index.html /index.html =404;
  }
}